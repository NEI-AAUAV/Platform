
location ~ ^/(api|static)/nei(/.*)?$ {
    limit_except GET POST PUT DELETE OPTIONS HEAD {
        deny all;
    }

    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_request_buffering off;
    
    proxy_pass http://api_nei_backend;
}

