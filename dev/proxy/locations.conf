location ~ ^/(api|static)/family(/.*)?$ {
    limit_except GET POST PUT DELETE OPTIONS HEAD {
        deny all;
    }
    
    # Override global WebSocket upgrade headers (api-family doesn't support WS)
    proxy_set_header Upgrade "";
    proxy_set_header Connection "";
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_request_buffering off;
    
    proxy_pass http://api_family_backend;
}

location / {
    proxy_pass http://web_nei_backend;
}
